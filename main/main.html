<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤 Weather App</title>
    <link href="./main.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="heading">🌤 Weather<span>App</span></h1>
            <button id="theme-toggle">☀️</button>
            <button id="changeCityBtn" onclick="window.location.href='../index.html'">Change City →</button>
        </div>
        <div class="loc-temp">
            <div class="loc-time">
                <h1 id="city"></h1>
                <p id="time"></p>
            </div>
            <h1 id="temp"></h1>
        </div>
        <h2 id="description" class="description"></h2>
        <div class="boxes">
            <div class="box">
                <span class="box-icon">🌡️</span>
                <p class="box-title">Feels Like</p>
                <h3 class="box-value" id="feels-like">--°C</h3>
            </div>
            <div class="box">
                <span class="box-icon">💧</span>
                <p class="box-title">Humidity</p>
                <h3 class="box-value" id="humidity">--%</h3>
            </div>
            <div class="box">
                <span class="box-icon">🌬️</span>
                <p class="box-title">Wind Speed</p>
                <h3 class="box-value" id="wind-speed">-- km/h</h3>
            </div>
            <div class="box">
                <span class="box-icon">🌫️</span>
                <p class="box-title">Pressure</p>
                <h3 class="box-value" id="pressure">-- hPa</h3>
            </div>
            <div class="box">
                <span class="box-icon">🍃</span>
                <p class="box-title">Air Quality</p>
                <h3 class="box-value" id="aqi">--</h3>
            </div>
            <div class="box">
                <span class="box-icon">👀</span>
                <p class="box-title">Visibility</p>
                <h3 class="box-value" id="visibility">-- km</h3>
            </div>
        </div>
        <h2 class="forecast-heading">5-Day Forecast</h2>
        <div class="forecast">
            <div class="forecast-box">
                <p class="f-day" id="f-day-0">Today</p>
                <div class="f-icon" id="f-icon-0"></div>
                <h3 class="f-temp" id="f-temp-0">28°C</h3>
            </div>
            <div class="forecast-box">
                <p class="f-day" id="f-day-1">Sun</p>
                <div class="f-icon" id="f-icon-1"></div>
                <h3 class="f-temp" id="f-temp-1">34°C</h3>
            </div>
            <div class="forecast-box">
                <p class="f-day" id="f-day-2">Mon</p>
                <div class="f-icon" id="f-icon-2"></div>
                <h3 class="f-temp" id="f-temp-2">30°C</h3>
            </div>
            <div class="forecast-box">
                <p class="f-day" id="f-day-3">Tue</p>
                <div class="f-icon" id="f-icon-3"></div>
                <h3 class="f-temp" id="f-temp-3">35°C</h3>
            </div>
            <div class="forecast-box">
                <p class="f-day" id="f-day-4">Wed</p>
                <div class="f-icon" id="f-icon-4"></div>
                <h3 class="f-temp" id="f-temp-4">36°C</h3>
            </div>
        </div>
            
        
    </div>

    <script src="../script.js"></script>
</body>
</html>

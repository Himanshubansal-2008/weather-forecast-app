<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤 Weather App</title>
    <link href="./main.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="heading">🌤 Weather<span>App</span></h1>
            <button id="changeCityBtn" onclick="window.location.href='../index.html'">Change City →</button>
        </div>
        <div class="loc-temp">
            <div class="loc-time">
                <h1 id="city"></h1>
                <p id="time"></p>
            </div>
            <h1 id="temp"></h1>
        </div>
        <h2 id="description" class="description"></h2>
        <div class="boxes">
            <div class="box">
                <span class="box-icon">🌡️</span>
                <p class="box-title">Feels Like</p>
                <h3 class="box-value" id="feels-like">--°C</h3>
            </div>
            <div class="box">
                <span class="box-icon">💧</span>
                <p class="box-title">Humidity</p>
                <h3 class="box-value" id="humidity">--%</h3>
            </div>
            <div class="box">
                <span class="box-icon">🌬️</span>
                <p class="box-title">Wind Speed</p>
                <h3 class="box-value" id="wind-speed">-- km/h</h3>
            </div>
            <div class="box">
                <span class="box-icon">🌫️</span>
                <p class="box-title">Pressure</p>
                <h3 class="box-value" id="pressure">-- hPa</h3>
            </div>
            <div class="box">
                <span class="box-icon">🍃</span>
                <p class="box-title">Air Quality</p>
                <h3 class="box-value" id="aqi">--</h3>
            </div>
            <div class="box">
                <span class="box-icon">👀</span>
                <p class="box-title">Visibility</p>
                <h3 class="box-value" id="visibility">-- km</h3>
            </div>
        </div>
        <div class="forecast">
            <div class="forecast-box">Box1</div>
            <div class="forecast-box">Box2</div>
            <div class="forecast-box">Box3</div>
            <div class="forecast-box">Box4</div>
            <div class="forecast-box">Box5</div>
        </div>
            
        
    </div>

    <script src="../script.js"></script>
</body>
</html>
